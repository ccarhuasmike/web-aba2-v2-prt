<p-toast></p-toast>
<form [formGroup]="formPersonaJuridica">
    <div class="grid grid-flow-row-dense sm:grid-cols-1 md:grid-cols-3 gap-4">
        <div class="md:col-span-3">
            <h3 class="text-base font-semibold mb-4">Archivos Adjuntos</h3>
        </div>
        <!-- Documentos Requeridos -->
        <div class="md:col-span-3">
            <h4 class="font-semibold mb-3 text-sm">Documentos Requeridos *</h4>
            <div class="grid grid-cols-1 md:grid-cols-1 gap-4">
                <div *ngFor="let doc of documentosRequeridos; let i = index"
                    class="bg-blue-50 p-4 rounded border border-blue-200">
                    <div class="flex justify-between items-start mb-3">
                        <label for="documentoRequerido{{i}}" class="block text-sm font-medium">{{ doc.tipo }} *</label>
                        <span *ngIf="!doc.archivo" class="text-xs text-red-600 font-semibold">REQUERIDO</span>
                        <span *ngIf="doc.archivo" class="text-xs text-green-600 font-semibold">✓ CARGADO</span>
                    </div>
                    <p-fileUpload id="documentoRequerido{{i}}" name="files" customUpload="true"
                        accept=".pdf,.jpeg,.jpg,.png,.xlsx,.xls" maxFileSize="3700000"
                        invalidFileTypeMessageSummary="{0}: archivo inválido"
                        invalidFileTypeMessageDetail="extensiones permitidas: {0}." uploadLabel="Cargar"
                        cancelLabel="Cancelar" chooseLabel="Seleccionar archivo" [showUploadButton]="false"
                        [showCancelButton]="false" (onSelect)="onFileUpload($event, 'requerido', i)">
                    </p-fileUpload>
                    <div *ngIf="doc.archivo"
                        class="mt-2 bg-green-50 p-3 rounded border border-green-200 flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <i class="pi pi-file text-green-600"></i>
                            <span class="text-sm text-gray-700">{{ doc.archivo.nombreArchivo }}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <p-button icon="pi pi-eye" severity="info" text size="small" pTooltip="Previsualizar"
                                tooltipPosition="top" (click)="previsualizarArchivo(doc.archivo)"
                                (keydown.enter)="previsualizarArchivo(doc.archivo)"
                                (keydown)="previsualizarArchivo(doc.archivo)"></p-button>
                            <p-button icon="pi pi-download" severity="success" text size="small" pTooltip="Descargar"
                                tooltipPosition="top" (click)="descargarArchivo(doc.archivo)"
                                (keydown.enter)="descargarArchivo(doc.archivo)"
                                (keydown)="descargarArchivo(doc.archivo)"></p-button>
                            <p-button icon="pi pi-times" severity="danger" text size="small"
                                (click)="doc.archivo = null" (keydown.enter)="doc.archivo = null"
                                (keydown)="doc.archivo = null"></p-button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Documentos Adicionales -->
        <div class="md:col-span-3">
            <h4 class="font-semibold mb-3 text-sm mt-6">Documentos Adicionales</h4>
            <div class="grid grid-cols-1 md:grid-cols-1 gap-4">
                <div *ngFor="let doc of documentosAdicionales; let i = index" class="bg-gray-50 p-4 rounded">
                    <div class="flex justify-between items-start mb-3">
                        <input pInputText type="text" [(ngModel)]="doc.tipo"
                            placeholder="Nombre del documento (ej: Certificado de constituci\u00f3n)" class="w-full">
                        <p-button icon="pi pi-trash" severity="danger" text size="small"
                            (click)="eliminarDocumentoAdicional(i)" (keydown.enter)="eliminarDocumentoAdicional(i)"
                            (keydown)="eliminarDocumentoAdicional(i)" class="ml-2"></p-button>
                    </div>
                    <p-fileUpload name="files" customUpload="true" accept=".pdf,.jpeg,.jpg,.png,.xlsx,.xls"
                        maxFileSize="3700000" invalidFileTypeMessageSummary="{0}: archivo inválido"
                        invalidFileTypeMessageDetail="extensiones permitidas: {0}." uploadLabel="Cargar"
                        cancelLabel="Cancelar" chooseLabel="Seleccionar archivo" [showUploadButton]="false"
                        [showCancelButton]="false" (onSelect)="onFileUpload($event, 'adicional', i)">
                    </p-fileUpload>
                    <div *ngIf="doc.archivo"
                        class="mt-2 bg-green-50 p-3 rounded border border-green-200 flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <i class="pi pi-file text-green-600"></i>
                            <span class="text-sm text-gray-700">{{ doc.archivo.nombreArchivo }}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <p-button icon="pi pi-eye" severity="info" text size="small" pTooltip="Previsualizar"
                                tooltipPosition="top" (click)="previsualizarArchivo(doc.archivo)"
                                (keydown.enter)="previsualizarArchivo(doc.archivo)"
                                (keydown)="previsualizarArchivo(doc.archivo)"></p-button>
                            <p-button icon="pi pi-download" severity="success" text size="small" pTooltip="Descargar"
                                tooltipPosition="top" (click)="descargarArchivo(doc.archivo)"
                                (keydown.enter)="descargarArchivo(doc.archivo)"
                                (keydown)="descargarArchivo(doc.archivo)"></p-button>
                            <p-button icon="pi pi-times" severity="danger" text size="small"
                                (click)="doc.archivo = null" (keydown.enter)="doc.archivo = null"
                                (keydown)="doc.archivo = null"></p-button>
                        </div>
                    </div>
                </div>
            </div>
            <p-button label="+ Agregar Documento Adicional" icon="pi pi-plus" size="small"
                (click)="agregarDocumentoAdicional()" (keydown.enter)="agregarDocumentoAdicional()"
                (keydown)="agregarDocumentoAdicional()" class="mt-4"></p-button>
        </div>

        <!-- Botones de Acción -->
        <div class="md:col-span-3 flex items-end justify-end gap-2 footer-modal">
            <p-button label="Cancelar" severity="secondary" (click)="cancelar()" (keydown.enter)="cancelar()"
                (keydown)="cancelar()"></p-button>
            <p-button label="Registrar" [disabled]="formPersonaJuridica.invalid" (click)="registrar()"
                (keydown.enter)="registrar()" (keydown)="registrar()"></p-button>
        </div>
    </div>
</form>
