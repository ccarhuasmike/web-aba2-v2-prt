<p-toast position="top-right" appendTo="body"></p-toast>

<form [formGroup]="formUsuario" class="grid grid-flow-row-dense sm:grid-cols-1 md:grid-cols-2 gap-4">
        <div class="md:col-span-2 mb-2">
            <h3 class="text-lg font-semibold text-gray-700 border-b-2 border-blue-500 pb-2">Datos Personales</h3>
        </div>
        <div class="md:col-span-1">
            <label for="tipoDocumento" class="block mb-1 text-sm font-medium">Tipo Documento *</label>
            <p-select id="tipoDocumento" [options]="tiposDocumento" formControlName="tipoDocumento"
                optionLabel="descripcion" optionValue="id" placeholder="Seleccione tipo" class="w-full">
            </p-select>
        </div>
        <div class="md:col-span-1">
            <label for="numeroDocumento" class="block mb-1 text-sm font-medium">Número Documento *</label>
            <div class="flex gap-2">
                <input id="numeroDocumento" pInputText type="text" class="w-full" formControlName="numeroDocumento"
                    placeholder="8 dígitos" />
                <p-button label="Buscar" icon="pi pi-search"
                    [disabled]="!formUsuario.get('tipoDocumento')?.value || !formUsuario.get('numeroDocumento')?.value"
                    (click)="buscarUsuario()" (keydown.enter)="buscarUsuario()" (keydown)="buscarUsuario()"
                    [loading]="buscandoUsuario" severity="info">
                </p-button>
            </div>
            <span *ngIf="usuarioEncontrado" class="text-sm text-green-600 flex items-center gap-1 mt-1">
                <i class="pi pi-check-circle"></i> Usuario encontrado
            </span>
        </div>

        <div class="md:col-span-1">
            <label for="nombres" class="block mb-1 text-sm font-medium">Nombres *</label>
            <input id="nombres" pInputText type="text" class="w-full" formControlName="nombres"
                placeholder="Ingrese nombres" />
        </div>
        <div class="md:col-span-1">
            <label for="apellidosPaterno" class="block mb-1 text-sm font-medium">Apellidos Paterno *</label>
            <input id="apellidosPaterno" pInputText type="text" class="w-full" formControlName="apellidosPaterno"
                placeholder="Ingrese apellidos paterno" />
        </div>
        <div class="md:col-span-1">
            <label for="apellidosMaterno" class="block mb-1 text-sm font-medium">Apellidos Materno *</label>
            <input id="apellidosMaterno" pInputText type="text" class="w-full" formControlName="apellidosMaterno"
                placeholder="Ingrese apellidos materno" />
        </div>
        <div class="md:col-span-1">
            <label for="correo" class="block mb-1 text-sm font-medium">Correo *</label>
            <input id="correo" pInputText type="email" class="w-full" formControlName="correo"
                placeholder="Ingrese correo" />
        </div>
        <div class="md:col-span-1">
            <label for="celular" class="block mb-1 text-sm font-medium">Celular *</label>
            <input id="celular" pInputText type="text" class="w-full" formControlName="celular"
                placeholder="9 dígitos" />
        </div>
        <div class="md:col-span-2 mb-2 mt-6">
            <h3 class="text-lg font-semibold text-gray-700 border-b-2 border-blue-500 pb-2">Adjuntos</h3>
        </div>

        <div class="md:col-span-2">
            <label for="imagenDocumento" class="block mb-1 text-sm font-medium">Imagen de Documento de Identidad</label>
            <p-fileUpload id="imagenDocumento" name="files" customUpload="true" accept=".pdf,.jpeg,.jpg,.png"
                maxFileSize="3700000" invalidFileTypeMessageSummary="{0}: archivo inválido"
                invalidFileTypeMessageDetail="extensiones permitidas: {0}." uploadLabel="Cargar" cancelLabel="Cancelar"
                chooseLabel="Seleccionar archivo" [showUploadButton]="false" [showCancelButton]="false"
                (onSelect)="onFileUpload($event)">
            </p-fileUpload>
            <div *ngIf="imagenDocumento"
                class="mt-2 flex items-center gap-2 p-2 bg-green-50 border border-green-200 rounded">
                <i class="pi pi-file text-green-600"></i>
                <span class="text-sm text-gray-700 flex-1">{{ imagenDocumento.nombre }}</span>
                <p-button icon="pi pi-times" severity="danger" text size="small" (click)="eliminarImagen()"
                    (keydown.enter)="eliminarImagen()" (keydown)="eliminarImagen()"></p-button>
            </div>
        </div>
        <div class="md:col-span-2">
            <h3 class="text-lg font-semibold text-gray-700 border-b-2 border-blue-500 pb-2">Asignación de Permisos</h3>
        </div>
        <div class="md:col-span-2">
            <label for="perfil" class="block mb-1 text-sm font-medium">Perfil *</label>
            <p-select id="perfil" [options]="perfilesDisponibles" formControlName="perfil" optionLabel="nombre"
                optionValue="idPerfil" placeholder="Seleccione un perfil" class="w-full"
                (onChange)="onPerfilChange($event)">
            </p-select>
        </div>
        <div class="md:col-span-2">
            <label for="cuentasAcceso" class="block mb-3 text-sm font-medium">Cuentas de Acceso *</label>

            <div *ngIf="!formUsuario.get('perfil')?.value"
                class="p-3 bg-yellow-50 border border-yellow-200 rounded-md text-sm text-yellow-800 mb-3">
                <i class="pi pi-info-circle mr-2"></i>
                Seleccione un perfil primero
            </div>

            <div *ngIf="formUsuario.get('perfil')?.value" class="space-y-3">
                <div *ngFor="let cuenta of cuentasAccesoControls; let i = index"
                    class="border border-gray-200 rounded-lg p-3 bg-gray-50 hover:bg-gray-100 transition"
                    [formGroup]="cuenta">

                    <!-- Checkbox de Cuenta -->
                    <div class="flex items-center gap-3 mb-3">
                        <input type="checkbox" [id]="'cuenta_' + i" formControlName="selected"
                            (change)="onCuentaSelectionChange(i)" class="w-4 h-4 cursor-pointer" />
                        <label [for]="'cuenta_' + i" class="font-medium text-sm text-gray-700 cursor-pointer flex-1">
                            {{ getNombreCuenta(cuenta.get('value')?.value) }}
                        </label>
                    </div>

                    <!-- Inputs de Autonomía (Condicional) -->
                    <ng-container *ngIf="mostrarAutonomia && cuenta.get('selected')?.value">
                        <div class="ml-7 bg-blue-50 p-3 rounded border border-blue-200">
                            <p class="text-xs font-semibold text-blue-900 mb-2">Límites de Autonomía</p>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                                <div>
                                    <label for="limiteDiario"
                                        class="block mb-1 text-xs font-medium text-gray-600">Límite Diario
                                        ({{monedaBase}}) *</label>
                                    <input pInputText id="limiteDiario" type="number" class="w-full"
                                        formControlName="limiteDiario" placeholder="0.00" [min]="0" />
                                </div>
                                <div>
                                    <label for="limiteTransaccion"
                                        class="block mb-1 text-xs font-medium text-gray-600">Límite Transacción
                                        ({{monedaBase}}) *</label>
                                    <input pInputText id="limiteTransaccion" type="number" class="w-full"
                                        formControlName="limiteTransaccion" placeholder="0.00" [min]="0" />
                                </div>
                                <div>
                                    <label for="numeroMaximoTransacciones"
                                        class="block mb-1 text-xs font-medium text-gray-600">Máx. Transacciones
                                        *</label>
                                    <input pInputText id="numeroMaximoTransacciones" type="number" class="w-full"
                                        formControlName="numeroMaximoTransacciones" placeholder="0" [min]="0" />
                                </div>
                            </div>
                        </div>
                    </ng-container>
                </div>
            </div>
            <div *ngIf="formUsuario.get('cuentasAcceso')?.invalid && formUsuario.get('cuentasAcceso')?.touched"
                class="mt-2 text-sm text-red-600">
                <p>Debe seleccionar al menos una cuenta</p>
            </div>
        </div>
        <div class="md:col-span-2 flex items-end justify-end gap-2 footer-modal mt-6">
            <p-button label="Guardar" [text]="true" severity="secondary" *ngIf="isUpdate"
                [disabled]="!formUsuario.valid || disableButtonAdd" (click)="guardar()" (keydown.enter)="guardar()"
                (keydown)="guardar()" />
            <p-button label="Actualizar" [text]="true" severity="secondary" *ngIf="!isUpdate"
                [disabled]="!formUsuario.valid || disableButtonUpdate " (click)="updatePerfil()"
                (keydown.enter)="updatePerfil()" (keydown)="updatePerfil()" />
            <p-button label="Cerrar" (click)="cancelar()" (keydown.enter)="cancelar()" (keydown)="cancelar()" />
        </div>
    </form>
