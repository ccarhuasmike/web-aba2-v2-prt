<div class="grid grid-cols-1 gap-4">
    <p-toast></p-toast>

    <!-- Título -->
    <div>
        <h2 class="text-2xl font-bold">Configurar Módulos</h2>
        <p class="text-sm text-gray-500">Asigne los módulos a los que tiene acceso el perfil: {{ perfil.nombre }}</p>
    </div>

    <!-- Acciones Rápidas -->
    <div class="flex gap-2">
        <p-button label="Seleccionar todos" icon="pi pi-check" severity="success" size="small"
        
        (click)="seleccionarTodos()" (keydown.enter)="seleccionarTodos()" (keydown)="seleccionarTodos()"

        ></p-button>
        <p-button label="Deseleccionar todos" icon="pi pi-times" severity="secondary" size="small" 
        
        (click)="deseleccionarTodos()" (keydown.enter)="deseleccionarTodos()" (keydown)="deseleccionarTodos()"

></p-button>
    </div>

    <!-- Grilla de Módulos -->
    <div class="grid grid-cols-1">
        <p-table [value]="modulos" 
                 styleClass="p-datatable-striped"
                 dataKey="id" 
                 [rowHover]="true" 
                 [showGridlines]="true" 
                 responsiveLayout="scroll">
            <ng-template #header>
                <tr>
                    <th scope="col" style="width: 50px; text-align: center;">Seleccionar</th>
                    <th scope="col">Módulo</th>
                    <th scope="col">Descripción</th>
                </tr>
            </ng-template>
            <ng-template #body let-modulo>
                <tr>
                    <td style="text-align: center;">
                        <p-checkbox [ngModel]="modulo.seleccionado" (onChange)="toggleModulo(modulo)"></p-checkbox>
                    </td>
                    <td class="font-semibold">{{ modulo.nombre }}</td>
                    <td>{{ modulo.descripcion }}</td>
                </tr>
            </ng-template>
        </p-table>
    </div>

    <!-- Botones de Acción -->
    <div class="flex justify-end gap-2">
        <p-button label="Cancelar" severity="secondary" (click)="cancelar()" (keydown.enter)="cancelar()" (keydown)="cancelar()"></p-button>
        <p-button label="Guardar" (click)="guardar()" (keydown.enter)="guardar()" (keydown)="guardar()"></p-button>
    </div>
</div>
