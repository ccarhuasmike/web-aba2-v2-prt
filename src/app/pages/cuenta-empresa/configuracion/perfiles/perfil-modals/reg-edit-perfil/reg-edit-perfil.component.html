<div class="grid grid-cols-1 gap-4">
    <p-toast></p-toast>
    <form [formGroup]="formAddPerfil">
        <div class="md:col-span-1">
            <label for="nombre" class="block mb-1 text-sm">Nombre Perfil</label>
            <input id="nombre" class="w-full" type="text" name="nombre" formControlName="nombre" pInputText
                autocomplete="off">
        </div>
        <div class="md:col-span-1">
            <label for="descripcion" class="block mb-1 text-sm">Descripción </label>
            <input id="descripcion" class="w-full" type="text" name="descripcion" formControlName="descripcion"
                pInputText autocomplete="off">
        </div>
        <div class="md:col-span-1">
            <label for="descripcion" class="block mb-1 text-sm">¿Con autonomía? </label>
            <p-toggleSwitch formControlName="flagAutonomia"></p-toggleSwitch>
        </div>
        <div class="md:col-span-1">
            <!-- Título -->
            <h2 class="text-2xl font-bold">Configurar Módulos</h2>
            <p class="text-sm text-gray-500">Asigne los módulos a los que tiene acceso el perfil: {{ perfil.nombre }}
            </p>


            <!-- Acciones Rápidas -->
            <div class="flex gap-2">
                <p-button label="Seleccionar todos" icon="pi pi-check" severity="success" size="small"
                    (click)="seleccionarTodos()" (keydown.enter)="seleccionarTodos()"
                    (keydown)="seleccionarTodos()"></p-button>
                <p-button label="Deseleccionar todos" icon="pi pi-times" severity="secondary" size="small"
                    (click)="deseleccionarTodos()" (keydown.enter)="deseleccionarTodos()"
                    (keydown)="deseleccionarTodos()"></p-button>
            </div>

            <!-- Grilla de Módulos -->
            <div class="grid grid-cols-1">
                <p-table [value]="modulos" styleClass="p-datatable-striped" dataKey="opcionId" [rowHover]="true"
                    [showGridlines]="true" responsiveLayout="scroll">
                    <ng-template #header>
                        <tr>
                            <th scope="col" style="width: 50px; text-align: center;">Seleccionar</th>
                            <th scope="col">Módulo</th>
                            <th scope="col">Descripción</th>
                        </tr>
                    </ng-template>
                    <ng-template #body let-modulo>
                        <tr>
                            <td style="text-align: center;">
                                <input type="checkbox" [(ngModel)]="modulo.seleccionado"
                                    [ngModelOptions]="{standalone: true}" (change)="toggleModuloCheckbox(modulo)" />
                            </td>
                            <td class="font-semibold">{{ modulo.nombre }}</td>
                            <td>{{ modulo.descripcion }}</td>
                        </tr>
                    </ng-template>
                </p-table>
            </div>
        </div>
        <div class="md:col-span-1 flex items-end justify-end gap-2 footer-modal">

            <p-button label="Guardar" [text]="true" severity="secondary" *ngIf="isUpdate"
                [disabled]="!formAddPerfil.valid || disableButtonAdd" (click)="guardar()" (keydown.enter)="guardar()"
                (keydown)="guardar()" />
            <p-button label="Actualizar" [text]="true" severity="secondary" *ngIf="!isUpdate"
                [disabled]="!formAddPerfil.valid || disableButtonUpdate " (click)="updatePerfil()"
                (keydown.enter)="updatePerfil()" (keydown)="updatePerfil()" />
            <p-button label="Cerrar" (click)="cancelar()" (keydown.enter)="cancelar()" (keydown)="cancelar()" />

        </div>
    </form>


</div>
