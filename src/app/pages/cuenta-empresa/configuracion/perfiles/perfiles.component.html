<div class="flex flex-col gap-4">
    <!-- Toast -->
    <p-toast></p-toast>

    <!-- Título -->
    <div class="flex items-center gap-2">
        <i class="pi pi-shield text-2xl"></i>
        <span class="text-3xl font-bold">Perfiles</span>
    </div>

    <!-- Búsqueda y Acciones -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 auto-rows-fr">
        <div class="flex flex-col gap-2">
            <p-button label="Nuevo Perfil" icon="pi pi-plus" (click)="onNew()"></p-button>
        </div>
    </div>

    <!-- Grilla de Resultados -->
    <div class="card">
        <p-table [value]="perfiles" class="mi-tabla-personalizada"
            currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} registros"
            [showCurrentPageReport]="true" dataKey="id" [rows]="10" [loading]="loading" [rowHover]="true"
            [showGridlines]="true" [paginator]="true" responsiveLayout="scroll" [totalRecords]="perfiles.length">
            <ng-template #header let-columns>
                <tr>
                    <th scope="col">Perfil</th>
                    <th scope="col">Descripción</th>
                    <th scope="col" style="text-align: center;">¿Con autonomía?</th>
                    <th scope="col" style="text-align: center;">Estado</th>
                    <th scope="col" style="text-align: center;">Acciones</th>
                </tr>
            </ng-template>
            <ng-template #body let-perfil style="cursor: pointer;">
                <tr (click)="onSelectPerfil(perfil)" (keydown)="onSelectPerfil(perfil)" tabindex="0">
                    <td class="font-semibold">{{ perfil.nombre }}</td>
                    <td>{{ perfil.descripcion }}</td>
                    <td style="text-align: center;">
                        <span
                            [class]="'px-3 py-1 rounded text-sm font-medium ' + (perfil.flagAutonomia === true ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800')">
                            {{ perfil.flagAutonomia === true ? 'Sí' : 'No' }}
                        </span>
                    </td>
                    <td style="text-align: center;">
                        <span
                            [class]="'px-3 py-1 rounded text-sm font-medium ' + (perfil.estado === 1 ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800')">
                            {{ perfil.estado === 1 ? 'Activo' : 'Inactivo' }}
                        </span>
                    </td>
                    <td style="text-align: center;">
                        <div class="flex gap-2 justify-center">
                            <p-button icon="pi pi-sliders-v" severity="info" size="small"
                                (click)="onManagePermissions(perfil)" pTooltip="Módulos"></p-button>
                            <p-button icon="pi pi-pencil" severity="secondary" size="small" (click)="onEdit(perfil)"
                                pTooltip="Editar"></p-button>
                            <p-button icon="pi pi-power-off"
                                [severity]="perfil.estado === 'Activo' ? 'danger' : 'success'" size="small"
                                (click)="onActivate(perfil)"
                                [pTooltip]="perfil.estado === 'Activo' ? 'Desactivar' : 'Activar'"></p-button>
                            <p-button icon="pi pi-trash" severity="danger" size="small" (click)="onDelete(perfil)"
                                pTooltip="Eliminar"></p-button>
                        </div>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>
