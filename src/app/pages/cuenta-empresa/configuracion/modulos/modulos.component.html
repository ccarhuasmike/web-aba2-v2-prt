<div class="flex flex-col gap-4">
    <!-- Toast -->
    <p-toast></p-toast>

    <!-- Título -->
    <div class="flex items-center gap-2">
        <i class="pi pi-th-large text-2xl"></i>
        <span class="text-3xl font-bold">Módulos</span>
    </div>

    <!-- Búsqueda y Acciones -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 auto-rows-fr">
        <div class="flex flex-col gap-2">
            <p-button label="Nuevo Módulo" icon="pi pi-plus" (click)="onNew()" (keydown.enter)="onNew()"
                (keydown)="onNew()"></p-button>
        </div>
    </div>

    <!-- Grilla de Resultados -->
    <div class="card">
        <p-table [value]="modulos" class="mi-tabla-personalizada"
            currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} registros"
            [showCurrentPageReport]="true" dataKey="id" [rows]="10" [loading]="loading" [rowHover]="true"
            [showGridlines]="true" [paginator]="true" responsiveLayout="scroll" [totalRecords]="modulos.length">
            <ng-template #header let-columns>
                <tr>
                    <th scope="col">ID</th>
                    <th scope="col">Nombre</th>
                    <th scope="col">Descripción</th>
                    <th scope="col" style="text-align: center;">Estado</th>
                    <th scope="col" style="text-align: center;">Acciones</th>
                </tr>
            </ng-template>
            <ng-template #body let-modulo style="cursor: pointer;">
                <tr (click)="onSelectModulo(modulo)" (keydown)="onSelectModulo(modulo)" tabindex="0">
                    <td>{{ modulo.opcionId }}</td>
                    <td class="font-semibold">{{ modulo.nombre }}</td>
                    <td>{{ modulo.descripcion }}</td>
                    <td style="text-align: center;">
                        <span
                            [class]="'px-3 py-1 rounded text-sm font-medium ' + (modulo.estado === 1 ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800')">
                            {{ modulo.estado === 1 ? 'Activo' : 'Inactivo' }}
                        </span>
                    </td>
                    <td style="text-align: center;">
                        <div class="flex gap-2 justify-center">
                            <p-button icon="pi pi-pencil" severity="secondary" size="small" 
                                (click)="onEdit(modulo)" (keydown.enter)="onEdit(modulo)" (keydown)="onEdit(modulo)"
                                pTooltip="Editar"></p-button>
                            <p-button icon="pi pi-power-off" [severity]="modulo.estado === 1 ? 'danger' : 'success'"
                                (click)="onActivate(modulo)" (keydown.enter)="onActivate(modulo)"
                                (keydown)="onActivate(modulo)" size="small"
                                [pTooltip]="modulo.estado === 1 ? 'Desactivar' : 'Activar'"></p-button>
                            <p-button icon="pi pi-trash" severity="danger" size="small" (click)="onDelete(modulo)"
                                (keydown.enter)="onDelete(modulo)" (keydown)="onDelete(modulo)"
                                pTooltip="Eliminar"></p-button>
                        </div>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>
